<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextStock — Produtos</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Next<span>Stock</span></h1>
    <nav>
      <a href="index.html" class="ativo">Produtos</a>
      <a href="categorias.html">Categorias</a>
    </nav>
  </header>

  <main>
    <section class="cartao">
      <h2 id="titulo-form">Novo produto</h2>
      <form id="form-produto">
        <div class="campo">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" required>
        </div>
        <div class="campo">
          <label for="id_categoria">Categoria</label>
          <select id="id_categoria"></select>
        </div>
        <div class="campo">
          <label for="codigo_barras">Código de barras</label>
          <input type="text" id="codigo_barras">
        </div>
        <div class="campo">
          <label for="preco_custo">Preço de custo (R$)</label>
          <input type="number" step="0.01" id="preco_custo">
        </div>
        <div class="campo">
          <label for="preco_venda">Preço de venda (R$) *</label>
          <input type="number" step="0.01" id="preco_venda" required>
        </div>
        <div class="campo">
          <label for="quantidade_estoque">Quantidade em estoque</label>
          <input type="number" id="quantidade_estoque" value="0">
        </div>
        <div class="campo">
          <label for="unidade">Unidade</label>
          <input type="text" id="unidade" value="UN">
        </div>
        <div class="campo">
          <label for="data_validade">Data de validade</label>
          <input type="date" id="data_validade">
        </div>
        <div class="botoes">
          <button type="submit">Salvar</button>
          <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="cartao">
      <h2>Produtos cadastrados</h2>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Validade</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-produtos"></tbody>
      </table>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/produtos.js"></script>
</body>
</html>
