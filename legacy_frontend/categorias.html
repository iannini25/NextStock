<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NextStock — Categorias</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Next<span>Stock</span></h1>
    <nav>
      <a href="index.html">Produtos</a>
      <a href="categorias.html" class="ativo">Categorias</a>
    </nav>
  </header>

  <main>
    <section class="cartao">
      <h2 id="titulo-form">Nova categoria</h2>
      <form id="form-categoria">
        <div class="campo">
          <label for="nome">Nome *</label>
          <input type="text" id="nome" required>
        </div>
        <div class="campo">
          <label for="descricao">Descrição</label>
          <input type="text" id="descricao">
        </div>
        <div class="botoes">
          <button type="submit">Salvar</button>
          <button type="button" id="btn-cancelar" style="display:none">Cancelar</button>
        </div>
      </form>
    </section>

    <section class="cartao">
      <h2>Categorias cadastradas</h2>
      <table>
        <thead>
          <tr>
            <th>Nome</th>
            <th>Descrição</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tabela-categorias"></tbody>
      </table>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/categorias.js"></script>
</body>
</html>
